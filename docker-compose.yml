version: '3.8'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ─── HTTP Backend ──────────────────────────────────────────────────
  http-backend:
    image: mukulbhardwajjjj/http-backend:latest   # pulled from Docker Hub
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb
      JWT_SECRET: your_jwt_secret_here
      PORT: 3001
    depends_on:
      - postgres
    restart: always

  # ─── WebSocket Backend ─────────────────────────────────────────────
  ws-backend:
    image: mukulbhardwajjjj/ws-backend:latest     # pulled from Docker Hub
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb
      JWT_SECRET: your_jwt_secret_here
      PORT: 8080
    depends_on:
      - postgres
    restart: always

  # ─── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    image: mukulbhardwajjjj/draw-frontend:latest       # pulled from Docker Hub
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb
    depends_on:
      - http-backend
      - ws-backend
    restart: always

volumes:
  pgdata:
